#
# Fast CI for the DuckDB AI extension.
#
# Pull requests run focused validation: formatting, clang-tidy, a Linux release
# build, SQLLogicTests, and the mock-provider smoke test. The heavier DuckDB
# extension distribution build remains available manually through workflow
# dispatch when release artifacts are needed.
#
name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      distribution:
        description: Run the full DuckDB extension distribution build
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GEN: ninja
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-22.04
    env:
      CC: gcc-10
      CXX: g++-10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/workflows/MainDistributionPipeline.yml

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang-format-11
          python -m pip install --upgrade pip
          python -m pip install cmake-format 'black==24.*' cxxheaderparser pcpp 'clang_format==11.0.1'

      - name: Run format check
        shell: bash
        run: |
          clang-format --version
          black --version
          make format-check

  tidy-check:
    name: Tidy check
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++
      TIDY_THREADS: 4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/workflows/MainDistributionPipeline.yml

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-tidy-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json', 'src/**', 'duckdb/CMakeLists.txt', 'extension-ci-tools/makefiles/duckdb_extension.Makefile') }}
          restore-keys: |
            ccache-${{ runner.os }}-tidy-${{ github.ref_name }}-
            ccache-${{ runner.os }}-tidy-

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang-tidy libcurl4-openssl-dev ccache
          python -m pip install --upgrade pip
          python -m pip install 'pybind11[global]'

      - name: Run tidy check
        shell: bash
        run: |
          ccache --zero-stats || true
          make tidy-check

      - name: Show ccache stats
        if: always()
        shell: bash
        run: ccache --show-stats || true

  build-test:
    name: Build and test
    runs-on: ubuntu-24.04
    env:
      CC: gcc
      CXX: g++
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-build-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json', 'src/**', 'test/**', 'duckdb/CMakeLists.txt', 'extension-ci-tools/makefiles/duckdb_extension.Makefile') }}
          restore-keys: |
            ccache-${{ runner.os }}-build-${{ github.ref_name }}-
            ccache-${{ runner.os }}-build-

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build libcurl4-openssl-dev ccache

      - name: Build release extension
        shell: bash
        run: |
          ccache --zero-stats || true
          make release

      - name: Run SQLLogicTests
        shell: bash
        run: make test

      - name: Run mock-provider smoke test
        shell: bash
        run: python3 test/smoke/mock_provider_smoke.py

      - name: Show ccache stats
        if: always()
        shell: bash
        run: ccache --show-stats || true

  distribution-build:
    name: Distribution build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.distribution }}
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: duckdb_ai
